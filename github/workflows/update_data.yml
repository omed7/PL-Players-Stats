name: Update FPL Data

on:
  schedule:
    # Runs automatically every day at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch: # This adds the button to let you run it manually

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run FPL fetcher script
        run: python fpl_fetcher.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add players.json
          git commit -m "Auto-update FPL player data [skip ci]" || exit 0
          git push
