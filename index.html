<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Premier League Statistics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>FPL Statistics</h1>

            <div class="controls">
                <div class="timeframe-toggle">
                    <button id="btn-last5" class="active">Last 5 Matches</button>
                    <button id="btn-last10">Last 10 Matches</button>
                </div>
                <div class="position-tabs">
                    <button id="btn-pos-all" class="active" data-pos="All">All</button>
                    <button id="btn-pos-gk" data-pos="GK">GK</button>
                    <button id="btn-pos-def" data-pos="DEF">DEF</button>
                    <button id="btn-pos-mid" data-pos="MID">MID</button>
                    <button id="btn-pos-fwd" data-pos="FWD">FWD</button>
                </div>

                <div class="minutes-filter-section">
                    <div class="minutes-header">
                        <label for="minutes-slider" id="minutes-label">Mins played: 0</label>
                        <div class="toggle-container">
                            <span class="toggle-label">Raw</span>
                            <label class="switch">
                                <input type="checkbox" id="minutes-toggle">
                                <span class="slider round"></span>
                            </label>
                            <span class="toggle-label">%</span>
                        </div>
                    </div>
                    <input type="range" id="minutes-slider" min="0" max="450" value="0" step="1">
                </div>

                <div class="filters">
                    <input type="text" id="search-input" placeholder="Search by Player Name...">
                    <div class="team-filter-row" id="team-filter-row">
                        <!-- Team logos will be populated here by JS -->
                    </div>
                </div>
            </div>
        </header>

        <main>
            <div id="error-message" class="error hidden">Failed to load player data.</div>

            <div class="table-container">
                <table id="players-table">
                    <thead>
                        <tr>
                            <th data-sort="name" class="sticky-col">Player Name <span class="sort-icon"></span></th>
                            <th data-sort="saves" id="col-saves" class="hidden">Saves <span class="sort-icon"></span></th>
                            <th data-sort="defcon" id="col-defcon">DefCon <span class="sort-icon"></span></th>
                            <th data-sort="xG" id="col-xg" class="active-sort desc">xG <span class="sort-icon">▼</span></th>
                            <th data-sort="xA" id="col-xa">xA <span class="sort-icon"></span></th>
                            <th data-sort="xGI" id="col-xgi">xGI <span class="sort-icon"></span></th>
                            <th data-sort="xGC" id="col-xgc">xGC <span class="sort-icon"></span></th>
                            <th data-sort="creativity" id="col-creativity">Creativity <span class="sort-icon"></span></th>
                            <th data-sort="threat" id="col-threat">Threat <span class="sort-icon"></span></th>
                            <th data-sort="ict" id="col-ict">ICT Index <span class="sort-icon"></span></th>
                            <th data-sort="bps" id="col-bps">BPS <span class="sort-icon"></span></th>
                            <th data-sort="bonus" id="col-bonus">Bonus <span class="sort-icon"></span></th>
                            <th data-sort="points" id="col-points">FPL Points <span class="sort-icon"></span></th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Data will be populated here -->
                    </tbody>
                </table>
            </div>

            <div class="pagination">
                <button id="btn-prev" disabled>Previous</button>
                <span id="page-info">Page 1 of 1</span>
                <button id="btn-next" disabled>Next</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
