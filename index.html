<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Premier League Statistics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>FPL Statistics</h1>

            <div class="controls">
                <div class="timeframe-toggle">
                    <button id="btn-season" class="active">Season Totals</button>
                    <button id="btn-last5">Last 5 Matches</button>
                </div>

                <div class="filters">
                    <input type="text" id="search-input" placeholder="Search by Player Name...">
                    <div class="custom-select" id="team-filter-container">
                        <button type="button" class="select-button" id="team-filter-btn">
                            <span class="select-text">All Teams</span>
                            <span class="select-arrow">▼</span>
                        </button>
                        <div class="select-dropdown hidden" id="team-filter-dropdown">
                            <!-- Checkboxes will be populated here by JS -->
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main>
            <div id="error-message" class="error hidden">Failed to load player data.</div>

            <div class="table-container">
                <table id="players-table">
                    <thead>
                        <tr>
                            <th data-sort="name">Player Name <span class="sort-icon"></span></th>
                            <th data-sort="xG" class="active-sort desc">xG <span class="sort-icon">▼</span></th>
                            <th data-sort="npxG">npxG <span class="sort-icon"></span></th>
                            <th data-sort="xA">xA <span class="sort-icon"></span></th>
                            <th data-sort="creativity">Creativity <span class="sort-icon"></span></th>
                            <th data-sort="points">FPL Points <span class="sort-icon"></span></th>
                            <th data-sort="bonus">Bonus <span class="sort-icon"></span></th>
                            <th data-sort="bps">BPS <span class="sort-icon"></span></th>
                            <th data-sort="influence">Influence <span class="sort-icon"></span></th>
                            <th data-sort="threat">Threat <span class="sort-icon"></span></th>
                            <th data-sort="ict">ICT Index <span class="sort-icon"></span></th>
                            <th data-sort="chances_created">Chances Created <span class="sort-icon"></span></th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Data will be populated here -->
                    </tbody>
                </table>
            </div>

            <div class="pagination">
                <button id="btn-prev" disabled>Previous</button>
                <span id="page-info">Page 1 of 1</span>
                <button id="btn-next" disabled>Next</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
