<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPL Scout — Player Statistics</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Page Header ── -->
  <header class="page-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-eyebrow">Fantasy Premier League</span>
        <h1 class="brand-title">FPL <span>Scout</span></h1>
      </div>
    </div>
  </header>

  <!-- ── Summary Strip ── -->
  <div class="summary-strip" id="summary-strip">
    <div class="summary-item"><span class="s-label">Showing</span><span class="s-val" id="s-count">—</span></div>
    <div class="summary-item"><span class="s-label">Avg xG</span><span class="s-val" id="s-avg-xg">—</span></div>
    <div class="summary-item"><span class="s-label">Top xG</span><span class="s-val" id="s-top-xg">—</span></div>
    <div class="summary-item"><span class="s-label">Top Pts</span><span class="s-val" id="s-top-pts">—</span></div>
  </div>

  <!-- ── Controls ── -->
  <div class="controls-shell">

    <!-- Timeframe + Position -->
    <div class="controls-top">
      <div class="seg-group" id="timeframe-group">
        <button id="btn-last5" class="active">Last 5</button>
        <button id="btn-last10">Last 10</button>
      </div>
      <div class="seg-group pos-group" id="position-group">
        <button data-pos="All" class="active">All</button>
        <button data-pos="GK">GK</button>
        <button data-pos="DEF">DEF</button>
        <button data-pos="MID">MID</button>
        <button data-pos="FWD">FWD</button>
      </div>
      <!-- Minutes slider inline -->
      <div class="minutes-bar">
        <label id="minutes-label">Min Minutes: 0</label>
        <input type="range" id="minutes-slider" min="0" max="450" value="0" step="1">
        <div class="toggle-wrap">
          <span>Raw</span>
          <label class="switch">
            <input type="checkbox" id="minutes-toggle">
            <span class="sw-track"></span>
          </label>
          <span>%</span>
        </div>
      </div>
    </div>

    <!-- Search + Team Filter -->
    <div class="controls-bottom">
      <div class="search-wrap">
        <!-- search icon -->
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search player…">
      </div>

      <div class="team-filter-section">
        <button class="team-filter-toggle-btn" id="team-filter-toggle-btn">
          <span id="team-filter-label">Filter by Team</span>
          <span class="toggle-arrow">&#9660;</span>
        </button>
        <div class="team-filter-panel" id="team-filter-panel">
          <div class="team-filter-actions">
            <button id="btn-select-all-teams">All</button>
            <button id="btn-clear-teams">Clear</button>
            <span class="selection-count" id="team-selection-count"></span>
          </div>
          <div class="team-logo-grid" id="team-filter-row"></div>
        </div>
      </div>
    </div>

  </div><!-- /controls-shell -->

  <!-- ── Main Content ── -->
  <main class="main-content">

    <div id="error-message" class="error hidden">
      Failed to load player data — serve over HTTP: <code>python3 -m http.server</code>
    </div>

    <div class="table-container">
      <table id="players-table">
        <thead>
          <tr>
            <th data-sort="name" class="sticky-col">Player <span class="sort-icon"></span></th>
            <th data-sort="saves"      id="col-saves"      class="hidden">Saves <span class="sort-icon"></span></th>
            <th data-sort="defcon"     id="col-defcon"                    >DefCon <span class="sort-icon"></span></th>
            <th data-sort="xG"         id="col-xg"  class="active-sort desc">xG <span class="sort-icon">&#9660;</span></th>
            <th data-sort="xA"         id="col-xa"                        >xA <span class="sort-icon"></span></th>
            <th data-sort="xGI"        id="col-xgi"                       >xGI <span class="sort-icon"></span></th>
            <th data-sort="xGC"                                           >xGC <span class="sort-icon"></span></th>
            <th data-sort="creativity" id="col-creativity"                >Creativity <span class="sort-icon"></span></th>
            <th data-sort="threat"     id="col-threat"                    >Threat <span class="sort-icon"></span></th>
            <th data-sort="ict"        id="col-ict"                       >ICT <span class="sort-icon"></span></th>
            <th data-sort="bps"                                           >BPS <span class="sort-icon"></span></th>
            <th data-sort="bonus"                                         >Bonus <span class="sort-icon"></span></th>
            <th data-sort="points"                                        >Pts <span class="sort-icon"></span></th>
            <th data-sort="value"      title="Points per £m"              >Pts/£m <span class="sort-icon"></span></th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>

    <div class="pagination">
      <button id="btn-prev" disabled>&#8592; Prev</button>
      <span id="page-info">Page 1 of 1</span>
      <button id="btn-next" disabled>Next &#8594;</button>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
