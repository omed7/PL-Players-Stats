<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Premier League Statistics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>FPL Statistics</h1>

            <div class="controls">
                <div class="timeframe-toggle">
                    <button id="btn-season" class="active">Season Totals</button>
                    <button id="btn-last5">Last 5 Matches</button>
                </div>

                <div class="filters">
                    <input type="text" id="search-input" placeholder="Search by Player Name...">
                    <select id="team-filter">
                        <option value="">All Teams</option>
                        <option value="Arsenal">Arsenal</option>
                        <option value="Aston Villa">Aston Villa</option>
                        <option value="Bournemouth">Bournemouth</option>
                        <option value="Brentford">Brentford</option>
                        <option value="Brighton & Hove Albion">Brighton & Hove Albion</option>
                        <option value="Chelsea">Chelsea</option>
                        <option value="Crystal Palace">Crystal Palace</option>
                        <option value="Everton">Everton</option>
                        <option value="Fulham">Fulham</option>
                        <option value="Ipswich Town">Ipswich Town</option>
                        <option value="Leicester City">Leicester City</option>
                        <option value="Liverpool">Liverpool</option>
                        <option value="Manchester City">Manchester City</option>
                        <option value="Manchester United">Manchester United</option>
                        <option value="Newcastle United">Newcastle United</option>
                        <option value="Nottingham Forest">Nottingham Forest</option>
                        <option value="Southampton">Southampton</option>
                        <option value="Tottenham Hotspur">Tottenham Hotspur</option>
                        <option value="West Ham United">West Ham United</option>
                        <option value="Wolverhampton Wanderers">Wolverhampton Wanderers</option>
                    </select>
                </div>
            </div>
        </header>

        <main>
            <div id="error-message" class="error hidden">Failed to load player data.</div>

            <div class="table-container">
                <table id="players-table">
                    <thead>
                        <tr>
                            <th data-sort="name">Player Name <span class="sort-icon"></span></th>
                            <th data-sort="team">Team <span class="sort-icon"></span></th>
                            <th data-sort="xG" class="active-sort desc">xG <span class="sort-icon">▼</span></th>
                            <th data-sort="xA">xA <span class="sort-icon"></span></th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Data will be populated here -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
